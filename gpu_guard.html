<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>GPU Guard v1.6</title>
<style>
 /* 鐵規則:不要綠色;頁面得獎級;老闆老花→大字。配色/質感沿用公司視覺標竿(靈感庫前端)同一套語言 */
 :root{--bg1:#070d1f;--bg2:#0b1530;--ink:#eef4ff;--mut:#a9bde0;
   --card:rgba(20,32,62,.78);--card2:#0b1730;--bd:rgba(95,150,220,.22);
   --gold:#ffd45e;--cyan:#5fe0ff;--accent:#7c9cff;--rose:#ff6f95;--orange:#ffab5e;
   --warnbg:rgba(255,171,94,.14);--critbg:rgba(255,111,149,.16)}
 *{box-sizing:border-box;margin:0;padding:0}
 html{font-size:18px}
 body{min-height:100vh;color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
   font-size:1.05rem;line-height:1.6;padding:30px 22px 70px;
   background:radial-gradient(1100px 640px at 82% -8%,rgba(95,224,255,.13),transparent 55%),
     radial-gradient(820px 560px at -8% 6%,rgba(124,140,255,.15),transparent 52%),
     linear-gradient(160deg,var(--bg1),var(--bg2));}
 .wrap{max-width:760px;margin:0 auto}
 .hd{display:flex;align-items:center;gap:14px;margin-bottom:18px}
 .orb{width:42px;height:42px;border-radius:50%;flex:none;
   background:radial-gradient(circle at 32% 30%,var(--cyan),var(--accent));
   box-shadow:0 0 20px rgba(95,224,255,.55)}
 h1{font-size:1.9rem;font-weight:900;letter-spacing:.5px}
 .sub{color:var(--mut);font-size:.95rem;margin-top:2px}
 .verWrap{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
 .ver{color:var(--mut);font-size:.8rem;text-align:right}
 .langBtn{background:var(--card2);border:1px solid var(--bd);border-radius:999px;
   padding:6px 14px;font-size:.82rem;font-weight:800;color:var(--cyan);cursor:pointer;transition:.15s}
 .langBtn:hover{border-color:var(--cyan);box-shadow:0 0 10px rgba(95,224,255,.35)}

 .alertBar{display:none;align-items:center;gap:10px;border-radius:16px;padding:14px 18px;
   margin-bottom:16px;font-weight:800;font-size:1rem;border:2px solid var(--gold);
   background:var(--warnbg);box-shadow:0 0 18px rgba(255,171,94,.3)}
 .alertBar.show{display:flex}
 .alertBar.crit{border-color:var(--rose);background:var(--critbg);box-shadow:0 0 22px rgba(255,111,149,.4);
   animation:pulseBar 1s infinite alternate}
 @keyframes pulseBar{from{filter:brightness(1)}to{filter:brightness(1.25)}}

 .card{background:var(--card);border:1px solid var(--bd);border-radius:20px;
   padding:20px 22px;margin-bottom:18px;box-shadow:0 8px 26px rgba(0,0,0,.32);
   backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}

 .row{display:flex;justify-content:space-between;align-items:baseline;margin:14px 0 7px;font-size:1.02rem}
 .row:first-child{margin-top:0}
 .row b{color:var(--mut);font-weight:800;font-size:.92rem;letter-spacing:.3px;text-transform:uppercase}
 .row span.val{font-weight:900;font-size:1.08rem}
 .row span.rl{color:var(--mut);font-size:.78rem;font-weight:700;margin-left:6px}

 .barTrack{background:rgba(255,255,255,.07);border-radius:999px;height:15px;overflow:hidden;position:relative;
   box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
 .barFill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.2,.8,.2,1),background .4s ease;
   background:linear-gradient(90deg,var(--cyan),var(--accent));box-shadow:0 0 12px rgba(95,224,255,.55)}
 .barFill.warn{background:linear-gradient(90deg,var(--gold),var(--orange));box-shadow:0 0 12px rgba(255,171,94,.55)}
 .barFill.crit{background:linear-gradient(90deg,var(--orange),var(--rose));box-shadow:0 0 16px rgba(255,111,149,.65);
   animation:pulse 1.1s infinite alternate}
 @keyframes pulse{from{filter:brightness(1)}to{filter:brightness(1.4)}}
 .redlineMark{position:absolute;top:-3px;bottom:-3px;width:2px;background:rgba(255,255,255,.55)}

 .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
 .stat{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:11px 8px;text-align:center}
 .stat .lb{font-size:.78rem;color:var(--mut);font-weight:700;margin-bottom:4px}
 .stat .vl{font-size:1.15rem;font-weight:900}
 .stat.crit .vl{color:var(--rose)}
 .stat.warn .vl{color:var(--gold)}

 .sectionTitle{font-size:.92rem;color:var(--mut);font-weight:800;margin-bottom:12px;
   text-transform:uppercase;letter-spacing:1px}

 .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;font-size:.86rem;color:var(--mut)}
 .legend span{display:inline-flex;align-items:center;gap:6px;font-weight:700}
 .legend i{width:14px;height:14px;border-radius:4px;display:inline-block;box-shadow:0 0 8px currentColor}
 .legend i.b{background:var(--cyan);color:var(--cyan)}
 .legend i.g{background:var(--gold);color:var(--gold)}
 .legend i.r{background:var(--rose);color:var(--rose)}

 .item{position:relative;display:flex;justify-content:space-between;align-items:center;gap:14px;
   background:var(--card2);border:1px solid var(--bd);border-radius:16px;
   padding:13px 16px 13px 20px;margin-bottom:10px;transition:.16s}
 .item::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:5px;border-radius:4px;
   background:var(--cc,var(--cyan));box-shadow:0 0 10px var(--cc,var(--cyan))}
 .item:hover{transform:translateY(-2px);border-color:var(--cyan);box-shadow:0 0 20px rgba(95,224,255,.25)}
 .item.suspect{border:2px solid var(--rose);box-shadow:0 0 0 4px var(--critbg),0 6px 18px rgba(0,0,0,.25)}
 .item.warn2{border:2px solid var(--gold);box-shadow:0 0 0 4px var(--warnbg),0 6px 18px rgba(0,0,0,.25)}

 .pName{font-weight:900;font-size:1.08rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
 .badge{font-size:.72rem;font-weight:900;background:var(--rose);color:#2a0810;
   padding:3px 10px;border-radius:999px;letter-spacing:.3px;box-shadow:0 0 10px rgba(255,111,149,.6)}
 .pSub{font-size:.86rem;color:var(--mut);margin-top:2px;font-weight:600}
 .pDesc{font-size:.8rem;color:var(--mut);opacity:.8;margin-top:3px;font-style:italic}

 .killBtn{flex:none;background:rgba(255,111,149,.15);color:var(--rose);border:1.5px solid var(--rose);
   border-radius:12px;padding:9px 16px;font-size:.92rem;font-weight:800;cursor:pointer;transition:.15s}
 .killBtn:hover{background:var(--rose);color:#1a0810;box-shadow:0 0 14px rgba(255,111,149,.5)}

 .ts{color:var(--mut);font-size:.82rem;text-align:right}
 .msg{margin-top:12px;font-size:.92rem;color:var(--gold);min-height:20px;font-weight:700}
 .redlineNote{font-size:.78rem;color:var(--mut);margin-top:14px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="orb"></div>
    <div><h1>GPU Guard</h1><div class="sub" id="subtitle">GPU滿載即時監控 ‧ 一鍵釋放VRAM ‧ 不用重開機</div></div>
    <div class="verWrap">
      <button class="langBtn" id="langBtn" onclick="toggleLang()">EN</button>
      <div class="ver">v1.6<br>2026-07-04</div>
    </div>
  </div>

  <div class="alertBar" id="alertBar"></div>

  <div class="card">
    <div class="row"><b id="gpuName">讀取中…</b><span class="ts" id="ts">--</span></div>

    <div class="row"><b id="lblVram">VRAM</b><span class="val" id="vramText">-- / -- GB</span><span class="rl" id="rlVram">紅線90% / 警戒75%</span></div>
    <div class="barTrack"><div class="barFill" id="vramBar" style="width:0%"></div><div class="redlineMark" id="vramRL"></div></div>

    <div class="row"><b id="lblUtil">使用率</b><span class="val" id="utilText">--%</span><span class="rl" id="rlUtil">紅線98% / 警戒85%</span></div>
    <div class="barTrack"><div class="barFill" id="utilBar" style="width:0%"></div><div class="redlineMark" id="utilRL"></div></div>

    <div class="row"><b id="lblPower">功耗</b><span class="val" id="powerText">-- / -- W</span><span class="rl" id="rlPower">紅線95% / 警戒85%</span></div>
    <div class="barTrack"><div class="barFill" id="powerBar" style="width:0%"></div><div class="redlineMark" id="powerRL"></div></div>

    <div class="grid4">
      <div class="stat" id="tempStat"><div class="lb" id="lblTemp">溫度(紅線85°C)</div><div class="vl" id="tempVal">--°C</div></div>
      <div class="stat"><div class="lb" id="lblClock">核心時脈</div><div class="vl" id="clockVal">--</div></div>
      <div class="stat"><div class="lb" id="lblFan">風扇</div><div class="vl" id="fanVal">--%</div></div>
      <div class="stat"><div class="lb" id="lblProcCount">佔用程式數</div><div class="vl" id="procCount">--</div></div>
    </div>
    <div class="redlineNote" id="redlineNote"></div>
  </div>

  <div class="card">
    <div class="sectionTitle" id="sectionTitle">佔用VRAM排行(即時更新，每2秒)</div>
    <div class="legend">
      <span><i class="b"></i><span id="legB">藍框＝正常監控中(VRAM佔比低，安全)</span></span>
      <span><i class="g"></i><span id="legG">金框＝次要留意(VRAM佔比10-25%)</span></span>
      <span><i class="r"></i><span id="legR">紅框＝主要嫌疑(VRAM佔比≥25%，最可能是卡機元兇)</span></span>
    </div>
    <div id="procList"></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const API = "http://localhost:8091";

// ===== 中英雙語設定(2026-07-04老闆指示：中英雙語，預設中文) =====

    noNvidia: "⚠ 這台電腦偵測不到 nvidia-smi，本工具目前僅支援 NVIDIA GeForce/Quadro 顯卡（AMD/Intel顯卡尚未支援）。",
    connErr: "⚠ 無法連線後端(gpu_guard_server.py是否已啟動?)",

    procDesc: {
      "dwm": "Windows桌面特效管理員(系統核心，勿隨意結束)",
      "explorer": "Windows檔案總管/桌面殼層(系統核心，勿隨意結束)",
      "csrss": "Windows系統子程序(系統核心，本工具禁止結束)",
      "chrome": "Google Chrome瀏覽器",
      "msedge": "Microsoft Edge瀏覽器",
      "msedgewebview2": "Edge內嵌網頁元件(常見於其他App內建的網頁畫面)",
      "pythonw": "Python背景程式(常見於ComfyUI/本地AI繪圖或推論工具，最常是VRAM大戶)",
      "python": "Python程式",
      "battle.net": "暴雪戰網遊戲平台",
      "codex": "OpenAI Codex 桌面應用",
      "claude": "Claude 桌面應用",
      "doubao": "豆包(字節跳動AI助理)桌面應用",
      "line": "LINE 通訊軟體",
      "linecall": "LINE 通話元件",
      "photos": "Windows 相片檢視器",
      "nvidia overlay": "NVIDIA App 內建疊加介面(遊戲內效能/錄影功能)",
      "shellexperiencehost": "Windows 系統殼層元件",
      "searchhost": "Windows 搜尋功能元件",

    },
  },
  en: {
    subtitle: "Real-time GPU overload monitor ‧ one-click VRAM release ‧ no reboot needed",
    vram: "VRAM", util: "Utilization", power: "Power",
    temp: "Temp (redline 85°C)", clock: "Core Clock", fan: "Fan", procCount: "Processes",
    rlVram: "Redline 90% / Warn 75%", rlUtil: "Redline 98% / Warn 85%", rlPower: "Redline 95% / Warn 85%",
    redlineNote: "Redline thresholds: VRAM 90% / Utilization 98% / Temp 85°C / Power 95% of limit. Crossing the redline shows an alert banner + sound; the 75%-redline range is a \"near-critical\" warning. All percentages are computed live against THIS GPU's own capacity/power limit, so it auto-adapts on any computer or GPU model.",
    sectionTitle: "Top VRAM consumers (live, updates every 2s)",
    legB: "Blue = normal, being monitored (low VRAM share, safe)",
    legG: "Gold = worth watching (10-25% VRAM share)",
    legR: "Red = prime suspect (≥25% VRAM share, most likely cause of freezes)",
    suspectBadge: (p) => "Suspect " + p + "%",
    procSub: (pid, mb, pct) => "PID " + pid + " · " + mb + " MB VRAM · GPU util " + pct + "%",
    killBtn: "End Process",
    killConfirm: (name, pid) => "End \"" + name + "\" (PID " + pid + ")?",
    alertCritPrefix: "🔴 Redline exceeded: ", alertCritSuffix: " — check the process list and consider ending it",
    alertWarnPrefix: "🟡 Near-critical: ", alertWarnSuffix: " — worth watching, not yet at redline",
    noNvidia: "⚠ nvidia-smi not found on this machine. This tool currently only supports NVIDIA GeForce/Quadro GPUs (AMD/Intel not yet supported).",

    procDesc: {

      "csrss": "Windows client/server runtime (system-critical, blocked in this tool)",

      "codex": "OpenAI Codex desktop app",
      "claude": "Claude desktop app",
      "doubao": "Doubao (ByteDance AI assistant) desktop app",
      "line": "LINE messenger",
      "linecall": "LINE call component",
      "photos": "Windows Photos viewer",
      "nvidia overlay": "NVIDIA App in-game overlay (performance/recording)",
      "shellexperiencehost": "Windows shell experience component",
      "searchhost": "Windows Search component",
      "startmenuexperiencehost": "Windows Start Menu component",
      "textinputhost": "Windows text input/IME component",
      "edgegameassist": "Edge browser Game Assist overlay",
      "qqliveservice": "QQ Live streaming background service",

    },
  },
};

function describeProc(name){
  const t = I18N[LANG];
  return t.procDesc[(name||"").toLowerCase()] || t.procDesc._default;
}

function applyStaticText(){
  const t = I18N[LANG];
  document.getElementById("subtitle").textContent = t.subtitle;
  document.getElementById("lblVram").textContent = t.vram;
  document.getElementById("lblUtil").textContent = t.util;
  document.getElementById("lblPower").textContent = t.power;
  document.getElementById("lblTemp").textContent = t.temp;
  document.getElementById("lblClock").textContent = t.clock;
  document.getElementById("lblFan").textContent = t.fan;
  document.getElementById("lblProcCount").textContent = t.procCount;
  document.getElementById("rlVram").textContent = t.rlVram;
  document.getElementById("rlUtil").textContent = t.rlUtil;
  document.getElementById("rlPower").textContent = t.rlPower;
  document.getElementById("redlineNote").textContent = t.redlineNote;
  document.getElementById("sectionTitle").textContent = t.sectionTitle;
  document.getElementById("legB").textContent = t.legB;
  document.getElementById("legG").textContent = t.legG;
  document.getElementById("legR").textContent = t.legR;
  document.getElementById("langBtn").textContent = LANG === "zh" ? "EN" : "中文";
  document.documentElement.lang = LANG === "zh" ? "zh-Hant" : "en";
}
function toggleLang(){
  LANG = LANG === "zh" ? "en" : "zh";
  localStorage.setItem("gg_lang", LANG);
  applyStaticText();
  refresh();
}

// ===== 顯卡顯示名稱設定(2026-07-04老闆指示：要寫品牌型號，nvidia-smi/驅動只回傳晶片代號不含AIB品牌，需手動配置覆蓋) =====
const GPU_DISPLAY_NAME_OVERRIDE = "ASUS GeForce RTX 5060 Ti 16G"; // 沒有這張卡/想用自動偵測名稱可以把這行設成 null
function resolveGpuDisplayName(rawName, memtotalMB){
  if (GPU_DISPLAY_NAME_OVERRIDE) return GPU_DISPLAY_NAME_OVERRIDE;
  const gb = Math.round(memtotalMB / 1024);
  return (rawName || "GPU") + " " + gb + "G";
}

// ===== 紅線標準設定(2026-07-04老闆指示：設定紅線+快臨界提醒) =====
const REDLINE = {
  vram:  {warn: 75, crit: 90},  // % of total VRAM
  util:  {warn: 85, crit: 98},  // % GPU utilization
  temp:  {warn: 75, crit: 85},  // °C (消費級顯卡通常85-90°C開始熱降頻，抓85°C當紅線留緩衝)
  power: {warn: 85, crit: 95},  // % of power limit
};

let lastCritKeys = new Set(); // 記錄上一輪已達紅線的項目，避免每2秒重複噴警報音
if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission().catch(()=>{});
}

function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "square"; o.frequency.value = 880;
    g.gain.value = 0.08;
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.18);
  }catch(e){}
}

function fmtBar(el, pct, thr){
  el.style.width = Math.max(0,Math.min(100, pct)) + "%";
  el.classList.remove("warn","crit");
  if(pct >= thr.crit) el.classList.add("crit");
  else if(pct >= thr.warn) el.classList.add("warn");
}
function setRedlineMark(el, thr){ el.style.left = thr.crit + "%"; }

function updateAlertBar(states){
  const t = I18N[LANG];
  const bar = document.getElementById("alertBar");
  const crits = states.filter(s => s.level === "crit");
  const warns = states.filter(s => s.level === "warn");
  bar.classList.remove("show","crit");
  if(crits.length){
    bar.textContent = t.alertCritPrefix + crits.map(s=>s.label).join("、") + t.alertCritSuffix;
    bar.classList.add("show","crit");
  } else if(warns.length){
    bar.textContent = t.alertWarnPrefix + warns.map(s=>s.label).join("、") + t.alertWarnSuffix;
    bar.classList.add("show");
  }
  const critKeys = new Set(crits.map(s=>s.key));
  let newlyCrit = false;
  critKeys.forEach(k => { if(!lastCritKeys.has(k)) newlyCrit = true; });
  if(newlyCrit) beep();
  lastCritKeys = critKeys;
}

async function refresh(){
  const t = I18N[LANG];
  try{
    const r = await fetch(API + "/stats");
    const d = await r.json();
    const states = [];
    if(d.gpu){
      const g = d.gpu;
      document.getElementById("gpuName").textContent = resolveGpuDisplayName(g.name, g.memtotal);
      const vramPct = Math.round(g.memused / g.memtotal * 100);
      const usedGB = (g.memused / 1024).toFixed(1);
      const totalGB = Math.round(g.memtotal / 1024);
      document.getElementById("vramText").textContent = usedGB + " / " + totalGB + " GB (" + vramPct + "%)";
      fmtBar(document.getElementById("vramBar"), vramPct, REDLINE.vram);
      setRedlineMark(document.getElementById("vramRL"), REDLINE.vram);
      if(vramPct>=REDLINE.vram.crit) states.push({key:"vram",level:"crit",label:t.labelVram+vramPct+"%"});
      else if(vramPct>=REDLINE.vram.warn) states.push({key:"vram",level:"warn",label:t.labelVram+vramPct+"%"});

      document.getElementById("utilText").textContent = g.util + "%";
      fmtBar(document.getElementById("utilBar"), g.util, REDLINE.util);
      setRedlineMark(document.getElementById("utilRL"), REDLINE.util);
      if(g.util>=REDLINE.util.crit) states.push({key:"util",level:"crit",label:t.labelUtil+g.util+"%"});
      else if(g.util>=REDLINE.util.warn) states.push({key:"util",level:"warn",label:t.labelUtil+g.util+"%"});

      const powerPct = g.powerlimit ? Math.round(g.power / g.powerlimit * 100) : 0;
      document.getElementById("powerText").textContent = g.power.toFixed(1) + " / " + g.powerlimit.toFixed(0) + " W (" + powerPct + "%)";
      fmtBar(document.getElementById("powerBar"), powerPct, REDLINE.power);
      setRedlineMark(document.getElementById("powerRL"), REDLINE.power);
      if(powerPct>=REDLINE.power.crit) states.push({key:"power",level:"crit",label:t.labelPower+powerPct+"%"});
      else if(powerPct>=REDLINE.power.warn) states.push({key:"power",level:"warn",label:t.labelPower+powerPct+"%"});

      document.getElementById("tempVal").textContent = g.temp + "°C";
      const tempStat = document.getElementById("tempStat");
      tempStat.classList.remove("warn","crit");
      if(g.temp>=REDLINE.temp.crit){ tempStat.classList.add("crit"); states.push({key:"temp",level:"crit",label:t.labelTemp+g.temp+"°C"}); }
      else if(g.temp>=REDLINE.temp.warn){ tempStat.classList.add("warn"); states.push({key:"temp",level:"warn",label:t.labelTemp+g.temp+"°C"}); }

      document.getElementById("clockVal").textContent = g.clock + " MHz";
      document.getElementById("fanVal").textContent = (g.fan === null || g.fan === undefined) ? "N/A" : g.fan + "%";

      const vramTotal = g.memtotal;
      const list = document.getElementById("procList");
      list.innerHTML = "";
      const procs = (d.processes || []).slice(0, 12);
      document.getElementById("procCount").textContent = (d.processes||[]).length;
      procs.forEach(function(p){
        const share = vramTotal ? (p.mb / vramTotal * 100) : 0;
        let cls = "", cc = "var(--cyan)", badge = "";
        if(share >= 25){ cls = " suspect"; cc = "var(--rose)"; badge = '<span class="badge">' + t.suspectBadge(share.toFixed(0)) + '</span>'; }
        else if(share >= 10){ cls = " warn2"; cc = "var(--gold)"; }
        const row = document.createElement("div");
        row.className = "item" + cls;
        row.style.setProperty("--cc", cc);
        row.innerHTML =
          '<div><div class="pName">' + p.name + badge + '</div>' +
          '<div class="pSub">' + t.procSub(p.pid, p.mb, (p.gpuPct||0).toFixed(1)) + '</div>' +
          '<div class="pDesc">' + describeProc(p.name) + '</div></div>';
        const btn = document.createElement("button");
        btn.className = "killBtn";
        btn.textContent = t.killBtn;
        btn.onclick = (function(pid,name){ return function(){ killProc(pid,name); }; })(p.pid, p.name);
        row.appendChild(btn);
        list.appendChild(row);
      });
    }
    updateAlertBar(states);
    document.getElementById("ts").textContent = (LANG==="zh"?"更新 ":"Updated ") + (d.ts || "--");
    if(d.error === "NO_NVIDIA_SMI"){
      document.getElementById("msg").textContent = t.noNvidia;
    } else {
      document.getElementById("msg").textContent = d.error ? ("⚠ " + d.error) : "";
    }
  }catch(e){
    document.getElementById("msg").textContent = t.connErr;
  }
}

async function killProc(pid, name){
  const t = I18N[LANG];
  if(!confirm(t.killConfirm(name, pid))) return;
  try{
    const r = await fetch(API + "/kill", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({pid: pid})
    });
    const d = await r.json();
    document.getElementById("msg").textContent = (d.ok ? "✅ " : "❌ ") + d.msg;
    refresh();
  }catch(e){
    document.getElementById("msg").textContent = t.killFail;
  }
}

applyStaticText();
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
