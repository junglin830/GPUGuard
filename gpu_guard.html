<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>GPU Guard</title>
<style>
  :root{
    --bg1:#0b1220; --bg2:#141c2e;
    --mica:rgba(255,255,255,0.045);
    --line:rgba(255,255,255,0.09);
    --cyan:#5ad8d2; --gold:#e9c568; --rose:#e8698c; --orange:#f2a24e; --indigo:#8f9bf5;
    --text:#eef2f8; --dim:#8ea0b8;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;
    background:radial-gradient(1200px 700px at 20% -10%, #1b2740 0%, var(--bg1) 55%), var(--bg1);
    color:var(--text);
    font-family:"Segoe UI Variable","Segoe UI","Microsoft JhengHei","Noto Sans TC",sans-serif;
    font-size:17px; padding:22px; min-width:380px;}
  h1{font-size:19px;margin:0 0 16px;color:var(--gold);letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;font-weight:700;}
  .card{background:var(--mica);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;
    box-shadow:0 8px 28px rgba(0,0,0,.35);}
  .grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0 4px;}
  .stat{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;}
  .stat .lb{font-size:12.5px;color:var(--dim);margin-bottom:3px;}
  .stat .vl{font-size:19px;font-weight:800;}
  .row{display:flex;justify-content:space-between;align-items:baseline;margin:12px 0 6px;font-size:16px;}
  .row b{font-size:15px;color:var(--dim);font-weight:600;}
  .barTrack{background:rgba(255,255,255,.06);border-radius:999px;height:14px;overflow:hidden;}
  .barFill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.2,.8,.2,1),background-color .4s ease;
    background:linear-gradient(90deg,var(--cyan),var(--indigo));}
  .barFill.warn{background:linear-gradient(90deg,var(--gold),var(--orange));}
  .barFill.crit{background:linear-gradient(90deg,var(--orange),var(--rose));
    animation:pulse 1.1s infinite alternate;}
  @keyframes pulse{from{filter:brightness(1);}to{filter:brightness(1.35);}}
  .procRow{display:flex;justify-content:space-between;align-items:center;
    padding:11px 12px;border-radius:12px;margin-bottom:6px;background:rgba(255,255,255,.02);
    border:1px solid transparent;}
  .procRow.suspect{border-color:var(--rose);background:rgba(232,105,140,.10);}
  .procMain{display:flex;flex-direction:column;gap:2px;}
  .procName{font-weight:700;font-size:16px;display:flex;align-items:center;gap:6px;}
  .badge{font-size:11px;font-weight:800;background:var(--rose);color:#230811;
    padding:2px 7px;border-radius:999px;letter-spacing:.3px;}
  .procSub{font-size:13px;color:var(--dim);}
  .killBtn{background:rgba(232,105,140,.16);color:var(--rose);border:1px solid var(--rose);
    border-radius:10px;padding:8px 14px;font-size:14.5px;font-weight:700;cursor:pointer;
    transition:.15s;}
  .killBtn:hover{background:var(--rose);color:#1a0810;}
  .ts{color:var(--dim);font-size:12.5px;text-align:right;margin-top:2px;}
  .msg{margin-top:10px;font-size:14px;color:var(--gold);min-height:18px;}
  .sectionTitle{font-size:14px;color:var(--dim);font-weight:700;margin-bottom:10px;
    text-transform:uppercase;letter-spacing:.6px;}
</style>
</head>
<body>
  <h1>⚡ GPU Guard</h1>

  <div class="card">
    <div class="row"><b id="gpuName">讀取中…</b><span id="ts" class="ts">--</span></div>

    <div class="row"><b>VRAM</b><span id="vramText">-- / -- MB</span></div>
    <div class="barTrack"><div class="barFill" id="vramBar" style="width:0%"></div></div>

    <div class="row"><b>使用率</b><span id="utilText">--%</span></div>
    <div class="barTrack"><div class="barFill" id="utilBar" style="width:0%"></div></div>

    <div class="row"><b>功耗</b><span id="powerText">-- / -- W</span></div>
    <div class="barTrack"><div class="barFill" id="powerBar" style="width:0%"></div></div>

    <div class="grid4">
      <div class="stat"><div class="lb">溫度</div><div class="vl" id="tempVal">--°C</div></div>
      <div class="stat"><div class="lb">核心時脈</div><div class="vl" id="clockVal">-- MHz</div></div>
      <div class="stat"><div class="lb">風扇</div><div class="vl" id="fanVal">--%</div></div>
      <div class="stat"><div class="lb">佔用VRAM程式數</div><div class="vl" id="procCount">--</div></div>
    </div>
  </div>

  <div class="card">
    <div class="sectionTitle">佔用VRAM排行（紅框＝主要嫌疑，佔比高）</div>
    <div id="procList"></div>
    <div class="msg" id="msg"></div>
  </div>

<script>
const API = "http://localhost:8091";

function fmtBar(el, pct){
  el.style.width = Math.max(0,Math.min(100, pct)) + "%";
  el.classList.remove("warn","crit");
  if(pct >= 95) el.classList.add("crit");
  else if(pct >= 80) el.classList.add("warn");
}

async function refresh(){
  try{
    const r = await fetch(API + "/stats");
    const d = await r.json();
    if(d.gpu){
      const g = d.gpu;
      document.getElementById("gpuName").textContent = g.name || "GPU";
      const vramPct = Math.round(g.memused / g.memtotal * 100);
      document.getElementById("vramText").textContent = g.memused + " / " + g.memtotal + " MB (" + vramPct + "%)";
      fmtBar(document.getElementById("vramBar"), vramPct);
      document.getElementById("utilText").textContent = g.util + "%";
      fmtBar(document.getElementById("utilBar"), g.util);
      const powerPct = g.powerlimit ? Math.round(g.power / g.powerlimit * 100) : 0;
      document.getElementById("powerText").textContent = g.power.toFixed(1) + " / " + g.powerlimit.toFixed(0) + " W (" + powerPct + "%)";
      fmtBar(document.getElementById("powerBar"), powerPct);
      document.getElementById("tempVal").textContent = g.temp + "°C";
      document.getElementById("clockVal").textContent = g.clock + " MHz";
      document.getElementById("fanVal").textContent = (g.fan === null || g.fan === undefined) ? "N/A" : g.fan + "%";

      var vramTotal = g.memtotal;
      var list = document.getElementById("procList");
      list.innerHTML = "";
      var procs = (d.processes || []).slice(0, 12);
      document.getElementById("procCount").textContent = (d.processes||[]).length;
      procs.forEach(function(p){
        var share = vramTotal ? (p.mb / vramTotal * 100) : 0;
        var isSuspect = share >= 25;
        var row = document.createElement("div");
        row.className = "procRow" + (isSuspect ? " suspect" : "");
        row.innerHTML =
          '<div class="procMain">' +
            '<div class="procName">' + p.name + (isSuspect ? '<span class="badge">主要嫌疑 ' + share.toFixed(0) + '%</span>' : '') + '</div>' +
            '<div class="procSub">PID ' + p.pid + ' · ' + p.mb + ' MB VRAM · GPU使用率 ' + (p.gpuPct||0).toFixed(1) + '%</div>' +
          '</div>';
        var btn = document.createElement("button");
        btn.className = "killBtn";
        btn.textContent = "結束程式";
        btn.onclick = (function(pid,name){ return function(){ killProc(pid,name); }; })(p.pid, p.name);
        row.appendChild(btn);
        list.appendChild(row);
      });
    }
    document.getElementById("ts").textContent = "更新 " + (d.ts || "--");
    document.getElementById("msg").textContent = d.error ? ("⚠ " + d.error) : "";
  }catch(e){
    document.getElementById("msg").textContent = "⚠ 無法連線後端(gpu_guard_server.py是否已啟動?)";
  }
}

async function killProc(pid, name){
  if(!confirm("確定要結束「" + name + "」(PID " + pid + ")嗎？")) return;
  try{
    const r = await fetch(API + "/kill", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({pid: pid})
    });
    const d = await r.json();
    document.getElementById("msg").textContent = (d.ok ? "✅ " : "❌ ") + d.msg;
    refresh();
  }catch(e){
    document.getElementById("msg").textContent = "⚠ 結束程式失敗";
  }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
