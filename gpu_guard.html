<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>GPU Guard</title>
<style>
 /* 鐵規則:不要綠色;頁面得獎級;老闆老花→大字。配色/質感沿用公司視覺標竿(靈感庫前端)同一套語言 */
 :root{--bg1:#070d1f;--bg2:#0b1530;--ink:#eef4ff;--mut:#a9bde0;
   --card:rgba(20,32,62,.78);--card2:#0b1730;--bd:rgba(95,150,220,.22);
   --gold:#ffd45e;--cyan:#5fe0ff;--accent:#7c9cff;--rose:#ff6f95;--orange:#ffab5e;
   --warnbg:rgba(255,171,94,.14);--critbg:rgba(255,111,149,.16)}
 *{box-sizing:border-box;margin:0;padding:0}
 html{font-size:18px}
 body{min-height:100vh;color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
   font-size:1.05rem;line-height:1.6;padding:30px 22px 70px;
   background:radial-gradient(1100px 640px at 82% -8%,rgba(95,224,255,.13),transparent 55%),
     radial-gradient(820px 560px at -8% 6%,rgba(124,140,255,.15),transparent 52%),
     linear-gradient(160deg,var(--bg1),var(--bg2));}
 .wrap{max-width:760px;margin:0 auto}
 .hd{display:flex;align-items:center;gap:14px;margin-bottom:18px}
 .orb{width:42px;height:42px;border-radius:50%;flex:none;
   background:radial-gradient(circle at 32% 30%,var(--cyan),var(--accent));
   box-shadow:0 0 20px rgba(95,224,255,.55)}
 h1{font-size:1.9rem;font-weight:900;letter-spacing:.5px}
 .sub{color:var(--mut);font-size:.95rem;margin-top:2px}

 .card{background:var(--card);border:1px solid var(--bd);border-radius:20px;
   padding:20px 22px;margin-bottom:18px;box-shadow:0 8px 26px rgba(0,0,0,.32);
   backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}

 .row{display:flex;justify-content:space-between;align-items:baseline;margin:14px 0 7px;font-size:1.02rem}
 .row:first-child{margin-top:0}
 .row b{color:var(--mut);font-weight:800;font-size:.92rem;letter-spacing:.3px;text-transform:uppercase}
 .row span.val{font-weight:900;font-size:1.08rem}

 .barTrack{background:rgba(255,255,255,.07);border-radius:999px;height:15px;overflow:hidden;
   box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
 .barFill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.2,.8,.2,1),background .4s ease;
   background:linear-gradient(90deg,var(--cyan),var(--accent));box-shadow:0 0 12px rgba(95,224,255,.55)}
 .barFill.warn{background:linear-gradient(90deg,var(--gold),var(--orange));box-shadow:0 0 12px rgba(255,171,94,.55)}
 .barFill.crit{background:linear-gradient(90deg,var(--orange),var(--rose));box-shadow:0 0 16px rgba(255,111,149,.65);
   animation:pulse 1.1s infinite alternate}
 @keyframes pulse{from{filter:brightness(1)}to{filter:brightness(1.4)}}

 .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
 .stat{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:11px 8px;text-align:center}
 .stat .lb{font-size:.78rem;color:var(--mut);font-weight:700;margin-bottom:4px}
 .stat .vl{font-size:1.15rem;font-weight:900}

 .sectionTitle{font-size:.92rem;color:var(--mut);font-weight:800;margin-bottom:12px;
   text-transform:uppercase;letter-spacing:1px}

 .item{position:relative;display:flex;justify-content:space-between;align-items:center;gap:14px;
   background:var(--card2);border:1px solid var(--bd);border-radius:16px;
   padding:13px 16px 13px 20px;margin-bottom:10px;transition:.16s}
 .item::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:5px;border-radius:4px;
   background:var(--cc,var(--cyan));box-shadow:0 0 10px var(--cc,var(--cyan))}
 .item:hover{transform:translateY(-2px);border-color:var(--cyan);box-shadow:0 0 20px rgba(95,224,255,.25)}
 .item.suspect{border:2px solid var(--rose);box-shadow:0 0 0 4px var(--critbg),0 6px 18px rgba(0,0,0,.25)}
 .item.warn2{border:2px solid var(--gold);box-shadow:0 0 0 4px var(--warnbg),0 6px 18px rgba(0,0,0,.25)}

 .pName{font-weight:900;font-size:1.08rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
 .badge{font-size:.72rem;font-weight:900;background:var(--rose);color:#2a0810;
   padding:3px 10px;border-radius:999px;letter-spacing:.3px;box-shadow:0 0 10px rgba(255,111,149,.6)}
 .pSub{font-size:.86rem;color:var(--mut);margin-top:2px;font-weight:600}

 .killBtn{flex:none;background:rgba(255,111,149,.15);color:var(--rose);border:1.5px solid var(--rose);
   border-radius:12px;padding:9px 16px;font-size:.92rem;font-weight:800;cursor:pointer;transition:.15s}
 .killBtn:hover{background:var(--rose);color:#1a0810;box-shadow:0 0 14px rgba(255,111,149,.5)}

 .ts{color:var(--mut);font-size:.82rem;text-align:right}
 .msg{margin-top:12px;font-size:.92rem;color:var(--gold);min-height:20px;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="orb"></div>
    <div><h1>GPU Guard</h1><div class="sub">GPU滿載即時監控 ‧ 一鍵釋放VRAM ‧ 不用重開機</div></div>
  </div>

  <div class="card">
    <div class="row"><b id="gpuName">讀取中…</b><span class="ts" id="ts">--</span></div>

    <div class="row"><b>VRAM</b><span class="val" id="vramText">-- / -- MB</span></div>
    <div class="barTrack"><div class="barFill" id="vramBar" style="width:0%"></div></div>

    <div class="row"><b>使用率</b><span class="val" id="utilText">--%</span></div>
    <div class="barTrack"><div class="barFill" id="utilBar" style="width:0%"></div></div>

    <div class="row"><b>功耗</b><span class="val" id="powerText">-- / -- W</span></div>
    <div class="barTrack"><div class="barFill" id="powerBar" style="width:0%"></div></div>

    <div class="grid4">
      <div class="stat"><div class="lb">溫度</div><div class="vl" id="tempVal">--°C</div></div>
      <div class="stat"><div class="lb">核心時脈</div><div class="vl" id="clockVal">--</div></div>
      <div class="stat"><div class="lb">風扇</div><div class="vl" id="fanVal">--%</div></div>
      <div class="stat"><div class="lb">佔用程式數</div><div class="vl" id="procCount">--</div></div>
    </div>
  </div>

  <div class="card">
    <div class="sectionTitle">佔用VRAM排行 ‧ 紅框=主要嫌疑 ‧ 金框=次要留意</div>
    <div id="procList"></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const API = "http://localhost:8091";

function fmtBar(el, pct){
  el.style.width = Math.max(0,Math.min(100, pct)) + "%";
  el.classList.remove("warn","crit");
  if(pct >= 95) el.classList.add("crit");
  else if(pct >= 80) el.classList.add("warn");
}

async function refresh(){
  try{
    const r = await fetch(API + "/stats");
    const d = await r.json();
    if(d.gpu){
      const g = d.gpu;
      document.getElementById("gpuName").textContent = g.name || "GPU";
      const vramPct = Math.round(g.memused / g.memtotal * 100);
      document.getElementById("vramText").textContent = g.memused + " / " + g.memtotal + " MB (" + vramPct + "%)";
      fmtBar(document.getElementById("vramBar"), vramPct);
      document.getElementById("utilText").textContent = g.util + "%";
      fmtBar(document.getElementById("utilBar"), g.util);
      const powerPct = g.powerlimit ? Math.round(g.power / g.powerlimit * 100) : 0;
      document.getElementById("powerText").textContent = g.power.toFixed(1) + " / " + g.powerlimit.toFixed(0) + " W (" + powerPct + "%)";
      fmtBar(document.getElementById("powerBar"), powerPct);
      document.getElementById("tempVal").textContent = g.temp + "°C";
      document.getElementById("clockVal").textContent = g.clock + " MHz";
      document.getElementById("fanVal").textContent = (g.fan === null || g.fan === undefined) ? "N/A" : g.fan + "%";

      const vramTotal = g.memtotal;
      const list = document.getElementById("procList");
      list.innerHTML = "";
      const procs = (d.processes || []).slice(0, 12);
      document.getElementById("procCount").textContent = (d.processes||[]).length;
      procs.forEach(function(p){
        const share = vramTotal ? (p.mb / vramTotal * 100) : 0;
        let cls = "", cc = "var(--cyan)", badge = "";
        if(share >= 25){ cls = " suspect"; cc = "var(--rose)"; badge = '<span class="badge">主要嫌疑 ' + share.toFixed(0) + '%</span>'; }
        else if(share >= 10){ cls = " warn2"; cc = "var(--gold)"; }
        const row = document.createElement("div");
        row.className = "item" + cls;
        row.style.setProperty("--cc", cc);
        row.innerHTML =
          '<div><div class="pName">' + p.name + badge + '</div>' +
          '<div class="pSub">PID ' + p.pid + ' · ' + p.mb + ' MB VRAM · GPU使用率 ' + (p.gpuPct||0).toFixed(1) + '%</div></div>';
        const btn = document.createElement("button");
        btn.className = "killBtn";
        btn.textContent = "結束程式";
        btn.onclick = (function(pid,name){ return function(){ killProc(pid,name); }; })(p.pid, p.name);
        row.appendChild(btn);
        list.appendChild(row);
      });
    }
    document.getElementById("ts").textContent = "更新 " + (d.ts || "--");
    document.getElementById("msg").textContent = d.error ? ("⚠ " + d.error) : "";
  }catch(e){
    document.getElementById("msg").textContent = "⚠ 無法連線後端(gpu_guard_server.py是否已啟動?)";
  }
}

async function killProc(pid, name){
  if(!confirm("確定要結束「" + name + "」(PID " + pid + ")嗎？")) return;
  try{
    const r = await fetch(API + "/kill", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({pid: pid})
    });
    const d = await r.json();
    document.getElementById("msg").textContent = (d.ok ? "✅ " : "❌ ") + d.msg;
    refresh();
  }catch(e){
    document.getElementById("msg").textContent = "⚠ 結束程式失敗";
  }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
